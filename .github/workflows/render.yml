name: Render SignalFlux Video

on:
  workflow_dispatch:
    inputs:
      title:
        description: 'Trend title (keep under 70 chars)'
        required: true
        default: 'AI tools are taking over content creation in 2026'
      score:
        description: 'Upvote score (numeric, e.g. 124000)'
        required: true
        default: '124000'
      niche:
        description: 'Content niche'
        required: true
        default: 'AI Tools'
      hook:
        description: 'Opening hook sentence (under 12 words)'
        required: true
        default: 'This AI tool just changed everything...'
      format:
        description: 'Video format'
        required: true
        default: 'short'
        type: choice
        options:
          - short
          - horizontal
      accent_color:
        description: 'Accent color hex (no #)'
        required: false
        default: 'ADFF2F'
      fact1:
        description: 'Optional supporting fact #1'
        required: false
        default: ''
      fact2:
        description: 'Optional supporting fact #2'
        required: false
        default: ''
      imageUrl:
        description: 'Optional image URL to include in the video'
        required: false
        default: ''

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Print runtime / tool versions (debug)
        run: |
          echo "::group::Environment"
          echo "Node:      $(node -v)"
          echo "npm:       $(npm -v)"
          echo "OS:        $(uname -a)"
          echo "PWD:       $(pwd)"
          echo "WORKSPACE: $GITHUB_WORKSPACE"
          echo "::endgroup::"

      - name: Print received workflow inputs (debug)
        env:
          INPUT_TITLE:  ${{ github.event.inputs.title }}
          INPUT_SCORE:  ${{ github.event.inputs.score }}
          INPUT_NICHE:  ${{ github.event.inputs.niche }}
          INPUT_HOOK:   ${{ github.event.inputs.hook }}
          INPUT_FORMAT: ${{ github.event.inputs.format }}
          INPUT_ACCENT: ${{ github.event.inputs.accent_color }}
          INPUT_FACT1:  ${{ github.event.inputs.fact1 }}
          INPUT_FACT2:  ${{ github.event.inputs.fact2 }}
          INPUT_IMAGE:  ${{ github.event.inputs.imageUrl }}
        run: |
          echo "::group::Inputs"
          echo "title:        $INPUT_TITLE"
          echo "score (raw):  $INPUT_SCORE"
          echo "niche:        $INPUT_NICHE"
          echo "hook:         $INPUT_HOOK"
          echo "format:       $INPUT_FORMAT"
          echo "accent_color: $INPUT_ACCENT"
          echo "fact1:        $INPUT_FACT1"
          echo "fact2:        $INPUT_FACT2"
          echo "imageUrl:     $INPUT_IMAGE"
          echo "::endgroup::"

      - name: Install dependencies
        run: npm install

      - name: Print Remotion version (debug)
        run: |
          echo "Remotion CLI version:"
          npx remotion versions || true
          npx remotion --version || true

      - name: Install Chromium for Remotion
        run: npx remotion browser ensure

      - name: Set composition ID
        id: comp
        run: |
          if [ "${{ github.event.inputs.format }}" = "horizontal" ]; then
            echo "id=TrendHorizontal" >> "$GITHUB_OUTPUT"
          else
            echo "id=TrendShort" >> "$GITHUB_OUTPUT"
          fi

      - name: Create output directory
        run: mkdir -p "$GITHUB_WORKSPACE/out"

      - name: Create Remotion props file
        env:
          INPUT_TITLE:  ${{ github.event.inputs.title }}
          INPUT_SCORE:  ${{ github.event.inputs.score }}
          INPUT_NICHE:  ${{ github.event.inputs.niche }}
          INPUT_HOOK:   ${{ github.event.inputs.hook }}
          INPUT_ACCENT: ${{ github.event.inputs.accent_color }}
          INPUT_FACT1:  ${{ github.event.inputs.fact1 }}
          INPUT_FACT2:  ${{ github.event.inputs.fact2 }}
          INPUT_IMAGE:  ${{ github.event.inputs.imageUrl }}
        run: |
          # Build props.json safely with Node so all string escaping is correct.
          # `score` is sanitized: strip non-digits, then coerce to Number.
          # This means "50K", "124,000", "$124000" all become valid numbers.
          node -e '
            const fs = require("fs");

            const rawScore = String(process.env.INPUT_SCORE || "").trim();
            const digits = rawScore.replace(/[^\d]/g, "");
            const score = digits.length > 0 ? Number(digits) : NaN;

            if (Number.isNaN(score)) {
              console.error("ERROR: score could not be parsed to a number. Raw value:", rawScore);
              process.exit(1);
            }

            const accentRaw = String(process.env.INPUT_ACCENT || "ADFF2F").replace(/^#/, "");

            const props = {
              title:       process.env.INPUT_TITLE,
              score,
              niche:       process.env.INPUT_NICHE,
              hook:        process.env.INPUT_HOOK,
              accentColor: "#" + accentRaw,
              fact1:       process.env.INPUT_FACT1 || "",
              fact2:       process.env.INPUT_FACT2 || "",
              imageUrl:    process.env.INPUT_IMAGE || "",
            };

            fs.writeFileSync("out/props.json", JSON.stringify(props, null, 2));
            console.log("Wrote out/props.json:");
            console.log(JSON.stringify(props, null, 2));
          '

      - name: Debug — verify props.json
        run: |
          echo "::group::Workspace listing"
          ls -la "$GITHUB_WORKSPACE"
          ls -la "$GITHUB_WORKSPACE/out"
          echo "::endgroup::"

          echo "::group::props.json contents"
          cat "$GITHUB_WORKSPACE/out/props.json"
          echo "::endgroup::"

          echo "::group::Validate props.json with node JSON.parse"
          node -e "JSON.parse(require('fs').readFileSync('$GITHUB_WORKSPACE/out/props.json','utf8')); console.log('props.json is valid JSON ✅')"
          echo "::endgroup::"

      - name: Render video
        run: |
          set -euxo pipefail
          PROPS_PATH="$GITHUB_WORKSPACE/out/props.json"
          OUT_PATH="$GITHUB_WORKSPACE/out/video.mp4"

          echo "Using composition: ${{ steps.comp.outputs.id }}"
          echo "Using props file:  $PROPS_PATH"
          echo "Output path:       $OUT_PATH"

          # Use an ABSOLUTE path for --props (a prior failing run used a relative
          # path which Remotion could not resolve/parse). Pass the value as a
          # separate argument to avoid any '=' quoting quirks.
          npx remotion render \
            src/index.tsx \
            "${{ steps.comp.outputs.id }}" \
            "$OUT_PATH" \
            --props "$PROPS_PATH" \
            --log=verbose

      - name: Debug — verify output video
        if: always()
        run: |
          echo "::group::Output directory after render"
          ls -la "$GITHUB_WORKSPACE/out" || true
          echo "::endgroup::"
          if [ -f "$GITHUB_WORKSPACE/out/video.mp4" ]; then
            echo "video.mp4 size: $(stat -c%s "$GITHUB_WORKSPACE/out/video.mp4") bytes"
          else
            echo "❌ video.mp4 was NOT created"
          fi

      - name: Upload rendered video
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: signalflux-video-${{ github.run_id }}
          path: out/video.mp4
          retention-days: 7

      - name: Upload debug props (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: signalflux-debug-${{ github.run_id }}
          path: |
            out/props.json
          retention-days: 7
          if-no-files-found: warn

      - name: Print download instructions
        if: success()
        run: |
          echo "✅ Video rendered successfully!"
          echo "Download: Actions tab → this run → Artifacts → signalflux-video-${{ github.run_id }}"
