name: Render SignalFlux Video
on:
  workflow_dispatch:
    inputs:
      title:
        description: 'Trend title (keep under 70 chars)'
        required: true
        default: 'AI tools are taking over content creation in 2026'
      score:
        description: 'Upvote score (number)'
        required: true
        default: '124000'
      niche:
        description: 'Content niche'
        required: true
        default: 'AI Tools'
      hook:
        description: 'Opening hook sentence (under 12 words)'
        required: true
        default: 'This AI tool just changed everything...'
      format:
        description: 'Video format'
        required: true
        default: 'short'
        type: choice
        options:
          - short
          - horizontal
      accent_color:
        description: 'Accent color hex (no #)'
        required: false
        default: 'ADFF2F'
jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Chromium for Remotion
        run: npx remotion browser ensure

      - name: Set composition ID
        id: comp
        run: |
          if [ "${{ github.event.inputs.format }}" = "horizontal" ]; then
            echo "id=TrendHorizontal" >> $GITHUB_OUTPUT
          else
            echo "id=TrendShort" >> $GITHUB_OUTPUT
          fi

      - name: Create output directory
        run: mkdir -p out

      - name: Create Remotion props file
        run: |
          cat << 'EOF' > out/props.json
          {
            "title": ${{ toJson(github.event.inputs.title) }},
            "score": ${{ github.event.inputs.score }},
            "niche": ${{ toJson(github.event.inputs.niche) }},
            "hook": ${{ toJson(github.event.inputs.hook) }},
            "accentColor": "#${{ github.event.inputs.accent_color }}"
          }
          EOF

      - name: Render video
        run: |
          npx remotion render \
            src/index.tsx \
            ${{ steps.comp.outputs.id }} \
            out/video.mp4 \
            --props=out/props.json

      - name: Upload rendered video
        uses: actions/upload-artifact@v4
        with:
          name: signalflux-video-${{ github.run_id }}
          path: out/video.mp4
          retention-days: 7

      - name: Print download instructions
        run: |
          echo "✅ Video rendered successfully!"
          echo "Download: Go to Actions tab → This run → Artifacts → signalflux-video-${{ github.run_id }}"
